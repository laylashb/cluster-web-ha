global
    log stdout format raw local0
    maxconn 4096

defaults
    mode http
    timeout connect 5s
    timeout client 30s
    timeout server 30s
    log global
    option httplog
    option httpchk GET /

frontend http_front
    bind *:80
    default_backend api_servers

backend api_servers
    balance roundrobin
    server api1 api1:80 check inter 2s fall 3 rise 2
    server api2 api2:80 check inter 2s fall 3 rise 2
    server api3 api3:80 check inter 2s fall 3 rise 2

listen stats
    bind *:8404
    stats enable
    stats uri /
    stats refresh 2s
